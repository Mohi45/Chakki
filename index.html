<!DOCTYPE html>
<html>

<head>
    <title>Atta Chakki Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- STYLE -->
    <link rel="stylesheet" href="style.css">

    <!-- ❌ TEMP REMOVE PWA (to avoid CORS issue) -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ff6b00">

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- ✅ LOAD CORE FIRST -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/firebase.js"></script>

    <!-- HELPERS -->
    <script src="js/utils.js"></script>

    <!-- FEATURES -->
    <script src="js/sales.js"></script>
    <script src="js/pisai.js"></script>
    <script src="js/purchase.js"></script>
    <script src="js/expense.js"></script>
    <script src="js/udhaar.js"></script>
    <script src="js/ledger.js"></script>

    <!-- UI -->
    <script src="js/ui.js"></script>

    <!-- ✅ APP LAST -->
    <script src="js/app.js"></script>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <img src="img/chakkilogo.png" class="logo-img" onclick="setPage('dashboard')">
        <h2 class="title" id="pageTitle">GhanShayam Bhog Atta Chakki</h2>
    </div>

    <!-- MAIN APP -->
    <div id="app"></div>

    <!-- INSTALL BUTTON -->
    <button id="installBtn" style="display:none; margin:10px;">
        📲 Install App
    </button>

    <!-- UDHAAR POPUP -->
    <div id="udharPopup" class="popup">
        <div class="popup-box">
            <h3>📒 Add Udhaar</h3>

            <input list="popupCustomerList" id="newCustomerName" placeholder="Search or Add Customer"
                oninput="autoFillPhone('newCustomerName','newCustomerPhone')">

            <datalist id="popupCustomerList"></datalist>

            <input id="newCustomerPhone" placeholder="Phone Number">
            <input id="popupAmount" placeholder="Amount">

            <br><br>
            <button onclick="savePopupUdhaar()">Save</button>
            <button onclick="closePopup()" style="background:red;color:white;">Cancel</button>
        </div>
    </div>


    <!-- 💰 COLLECT PAYMENT POPUP -->
    <div id="collectPopup" class="popup">
        <div class="popup-box">

            <h3>💰 Collect Payment</h3>

            <input id="collectName" readonly>
            <input id="collectPhone" readonly>

            <input id="collectAmount" placeholder="Enter Amount">

            <br><br>

            <button onclick="collectFull()">✅ Full</button>
            <button onclick="collectPartial()">➗ Partial</button>
            <button onclick="closeCollectPopup()" style="background:red;">
                ❌ Cancel
            </button>

        </div>
    </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button onclick="setPage('dashboard')">🏠<br>Home</button>
        <button onclick="setPage('sales')">💰<br>Sales</button>
        <button onclick="setPage('pisai')">🌾<br>Pisai</button>
        <button onclick="setPage('purchase')">🛒<br>Buy</button>
        <button onclick="setPage('expense')">💸<br>Exp</button>
        <button onclick="setPage('udhaar')">📒<br>Udhaar</button>
        <button onclick="setPage('history')">📜<br>History</button>
    </div>

</body>

</html>
