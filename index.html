<!DOCTYPE html>
<html>

<head>
    <title>Atta Chakki Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ff6b00">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/sales.js"></script>
    <script src="js/pisai.js"></script>
    <script src="js/purchase.js"></script>
    <script src="js/expense.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/udhaar.js"></script>
    <script src="js/ledger.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</head>

<body>
    <div class="header">
        <img src="img/chakkilogo.png" class="logo-img" onclick="setPage('dashboard')">
        <h2 class="title" id="pageTitle">🕉️ श्री गणेशाय नमः GhanShayam Bhog Atta Chakki</h2>
        <button id="calculatorToggle" class="header-toggle" onclick="toggleCalculatorPanel()">Calculator</button>
        <button id="langToggle" class="header-toggle" onclick="toggleLang()">हिंदी</button>
    </div>

    <div id="calculatorPanelHost"></div>
    <div id="app"></div>

    <button id="installBtn" style="display:none; margin:10px;">📲 Install App</button>

    <div id="udharPopup" class="popup">
        <div class="popup-box">
            <h3 id="addUdhaarTitle">📒 Add Udhaar</h3>
            <input list="popupCustomerList" id="newCustomerName" placeholder="Search or Add Customer"
                oninput="autoFillPhone('newCustomerName','newCustomerPhone'); renderUdhaarPopupCustomers()">
            <datalist id="popupCustomerList"></datalist>
            <input id="newCustomerPhone" placeholder="Phone Number *" maxlength="10" inputmode="numeric" required>
            <input id="popupAmount" placeholder="Amount">
            <div id="udhaarPopupCustomerCards" style="margin-top:12px; max-height:260px; overflow:auto;"></div>
            <br><br>
            <button id="saveUdhaarBtn" onclick="savePopupUdhaar()">Save</button>
            <button id="cancelUdhaarBtn" onclick="closePopup()" style="background:red;color:white;">Cancel</button>
        </div>
    </div>

    <div id="collectPopup" class="popup">
        <div class="popup-box">
            <h3 id="collectPaymentTitle">💰 Collect Payment</h3>
            <input id="collectName" readonly>
            <input id="collectPhone" readonly>
            <input id="collectAmount" placeholder="Enter Amount">
            <br><br>
            <button id="collectFullBtn" onclick="collectFull()">✅ Full</button>
            <button id="collectPartialBtn" onclick="collectPartial()">➖ Partial</button>
            <button id="cancelCollectBtn" onclick="closeCollectPopup()" style="background:red;">❌ Cancel</button>
        </div>
    </div>

    <div id="editPopup" class="popup">
        <div class="popup-box">
            <h3 id="editEntryTitle">✏️ Edit Entry</h3>
            <input id="editName" placeholder="Customer Name">
            <input id="editPhone" placeholder="Phone Number *" maxlength="10" inputmode="numeric" required>
            <input id="editKg" placeholder="Kg / Packets">
            <input id="editAmount" placeholder="Amount">
            <br><br>
            <button id="updateEntryBtn" onclick="updateEntry()">Update</button>
            <button id="cancelEditBtn" onclick="closeEditPopup()" style="background:red;color:white;">Cancel</button>
        </div>
    </div>

    <footer class="app-footer">Managed by Safachatt Group since 2022</footer>

    <div class="bottom-nav">
        <button id="navDashboard" onclick="setPage('dashboard')">🏠<br>Home</button>
        <button id="navSales" onclick="setPage('sales')">💰<br>Sales</button>
        <button id="navPisai" onclick="setPage('pisai')">🌾<br>Pisai</button>
        <button id="navPurchase" onclick="setPage('purchase')">🛒<br>Buy</button>
        <button id="navExpense" onclick="setPage('expense')">💸<br>Exp</button>
        <button id="navUdhaar" onclick="setPage('udhaar')">📒<br>Udhaar</button>
        <button id="navHistory" onclick="setPage('history')">📜<br>History</button>
    </div>
</body>

</html>
